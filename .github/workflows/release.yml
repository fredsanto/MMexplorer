name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.12"
          channels: conda-forge,defaults
          channel-priority: strict
          activate-environment: buildenv
          auto-activate-base: false

      - name: Install conda dependencies
        shell: bash -el {0}
        run: |
          conda install -y -c conda-forge openmm pdbfixer numpy

      - name: Install pip dependencies
        shell: bash -el {0}
        run: |
          pip install pyinstaller flask biopython requests werkzeug jinja2

      - name: Build with PyInstaller
        shell: bash -el {0}
        run: |
          pyinstaller protein_mutation.spec --log-level WARN

      - name: Download VC++ redistributable
        shell: bash -el {0}
        run: |
          curl -L "https://aka.ms/vs/17/release/vc_redist.x64.exe" \
            -o installer/vc_redist.x64.exe

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create output directory
        run: mkdir -p installer\output

      - name: Build installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\Compil32.exe" installer\setup.iss

      - name: Confirm installer exists
        run: |
          dir installer\output\
          if (!(Test-Path "installer\output\ProteinMutationExplorer-1.0.0-Setup.exe")) {
            Write-Error "Installer not found"
            exit 1
          }

      - name: Rename installer to include tag version
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          Rename-Item `
            "installer\output\ProteinMutationExplorer-1.0.0-Setup.exe" `
            "installer\output\ProteinMutationExplorer-$version-Setup.exe" `
            -ErrorAction SilentlyContinue

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          name: "Protein Mutation Explorer ${{ github.ref_name }}"
          body: |
            ## Protein Mutation Explorer ${{ github.ref_name }}
            Download and run the installer below.
            Requires Windows 10 or later (64-bit).
          files: installer/output/ProteinMutationExplorer-*-Setup.exe
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
